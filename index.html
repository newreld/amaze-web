<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5b3a1c">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AMAZE">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="style.css">
  <title>AMAZE</title>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- In-game top bar: solid wood bar with Back, centered title, Restart.
       Settings live only on the home screen now. -->
  <header id="game-topbar" class="hidden" aria-hidden="true">
    <button class="topbar-btn icon-btn" id="btn-menu" aria-label="Back to menu">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round"
              d="M15 6 L9 12 L15 18"/>
      </svg>
    </button>
    <div class="topbar-title" id="topbar-title">AMAZE</div>
    <button class="topbar-btn icon-btn" id="btn-restart" aria-label="Restart maze">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"
              d="M19 11 A7 7 0 1 0 18.4 14.5"/>
        <path fill="currentColor"
              d="M19 6 L19.6 11.5 L14.5 11"/>
      </svg>
    </button>
  </header>

  <!-- Floating acorn HUD (only when collectibles are on).  Positioned
       under the top bar, right side. -->
  <div id="acorn-counter" class="acorn-counter hidden" aria-label="Collected acorns">
    <span class="acorn dim">🌰</span>
    <span class="acorn dim">🌰</span>
    <span class="acorn dim">🌰</span>
  </div>

  <!-- Difficulty picker -->
  <div id="menu" class="overlay">
    <div class="menu-frame">
      <h1 class="title">AMAZE</h1>
      <p class="sub">choose your path</p>

      <button class="diff-btn" data-difficulty="easy">
        <span class="diff-name">Easy</span>
        <span class="diff-detail">7 × 11 grid</span>
      </button>
      <button class="diff-btn" data-difficulty="medium">
        <span class="diff-name">Medium</span>
        <span class="diff-detail">11 × 17 grid</span>
      </button>
      <button class="diff-btn" data-difficulty="hard">
        <span class="diff-name">Hard</span>
        <span class="diff-detail">15 × 23 grid</span>
      </button>

      <button class="settings-link" id="btn-menu-settings" aria-label="Settings">⚙</button>
    </div>
  </div>

  <!-- Win modal — pops in after the canvas walk-cinema completes. -->
  <div id="win-modal" class="overlay hidden" role="dialog" aria-label="Maze complete">
    <div class="win-card">
      <div class="win-header">YOU MADE IT!</div>
      <div class="win-acorns" id="win-acorns" aria-label="Collected acorns">
        <span class="dim">🌰</span>
        <span class="dim">🌰</span>
        <span class="dim">🌰</span>
      </div>
      <p class="win-tagline" id="win-tagline">You navigated the woods like a pro.</p>
      <div class="win-actions">
        <button class="win-btn win-btn-secondary" id="btn-win-home">Home</button>
        <button class="win-btn win-btn-primary" id="btn-win-again">Again ▶</button>
      </div>
    </div>
  </div>

  <!-- Settings panel — opens from either the in-game top bar or the menu. -->
  <div id="settings-overlay" class="overlay hidden" role="dialog" aria-label="Settings">
    <div class="settings-frame">
      <h2 class="settings-title">Settings</h2>

      <label class="toggle-row" for="toggle-collectibles">
        <span class="toggle-text">
          <span class="toggle-label">Collectibles</span>
          <span class="toggle-detail">Show 3 acorns to collect for star ratings.</span>
        </span>
        <input type="checkbox" id="toggle-collectibles" class="toggle-input" />
      </label>

      <button class="settings-done" id="btn-close-settings">Done</button>
    </div>
  </div>

  <!-- One-time hint to install on iOS -->
  <div id="install-hint" class="install-hint hidden">
    Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> to install.
    <button id="dismiss-hint" aria-label="dismiss">×</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
