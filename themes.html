<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMAZE — Themes</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px 24px 64px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #eee;
      min-height: 100vh;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 0.5px;
    }
    .lead {
      margin: 0 0 32px;
      opacity: 0.7;
      max-width: 60ch;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .card {
      border-radius: 18px;
      overflow: hidden;
      background: #2a2a2a;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }
    .preview {
      aspect-ratio: 4 / 3;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }
    .preview .name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.55);
      letter-spacing: 0.3px;
    }
    .swatches {
      padding: 14px 16px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
      font-size: 12px;
    }
    .swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .swatch .chip {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .swatch .meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .swatch .label {
      opacity: 0.6;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .swatch .value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    a.back {
      color: #8ab4ff;
      text-decoration: none;
    }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>AMAZE — Themes</h1>
  <p class="lead">
    All six in-game themes, in order.  The preview shows the full menu/game
    background gradient (radial sun + linear base→dark pass).  Swatches below
    list the raw colour roles each theme uses.
    <br><a class="back" href="index.html">← back to game</a>
  </p>
  <div class="grid" id="grid"></div>

  <script type="module">
    import { LevelStyles } from './maze.js';

    function gradient(s) {
      return `
        radial-gradient(ellipse at 85% 10%, ${s.bgGradientSun} 0%, ${s.backgroundColor} 32%, transparent 70%),
        linear-gradient(180deg, ${s.backgroundColor} 0%, ${s.bgGradientDark} 100%)
      `;
    }

    const ROLES = [
      ['backgroundColor', 'base'],
      ['bgGradientSun',   'sun'],
      ['bgGradientDark',  'dark'],
      ['wallColor',       'wall'],
      ['wallTint',        'tint'],
      ['trailColor',      'trail'],
    ];

    const grid = document.getElementById('grid');
    LevelStyles.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card';

      const preview = document.createElement('div');
      preview.className = 'preview';
      preview.style.background = gradient(s);
      preview.innerHTML = `<span class="name">${i + 1}. ${s.name}</span>`;

      const swatches = document.createElement('div');
      swatches.className = 'swatches';
      swatches.innerHTML = ROLES.map(([key, label]) => `
        <div class="swatch">
          <span class="chip" style="background:${s[key]}"></span>
          <span class="meta">
            <span class="label">${label}</span>
            <span class="value">${s[key]}</span>
          </span>
        </div>
      `).join('');

      card.appendChild(preview);
      card.appendChild(swatches);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
